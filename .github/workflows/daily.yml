name: Daily Robot News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate news and daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os, re, time

          api_key = os.environ['ANTHROPIC_API_KEY']
          today = datetime.date.today().strftime('%Y年%-m月%-d日')

          def call_claude(prompt):
              payload = json.dumps({
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": 4000,
                  "tools": [{"type": "web_search_20250305", "name": "web_search"}],
                  "messages": [{"role": "user", "content": prompt}]
              }).encode('utf-8')
              req = urllib.request.Request(
                  'https://api.anthropic.com/v1/messages',
                  data=payload,
                  headers={
                      'x-api-key': api_key,
                      'anthropic-version': '2023-06-01',
                      'content-type': 'application/json'
                  }
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  data = json.loads(resp.read())
              return ''.join(b['text'] for b in data['content'] if b['type'] == 'text')

          def extract_json(text):
              s = text.index('{')
              depth = 0; e = -1
              for i, c in enumerate(text[s:], s):
                  if c == '{': depth += 1
                  elif c == '}':
                      depth -= 1
                      if depth == 0: e = i; break
              raw = text[s:e+1]
              raw = raw.replace('\u201c', '"').replace('\u201d', '"')
              raw = re.sub(r',\s*([}\]])', r'\1', raw)
              raw = re.sub(r'"([^"\\]*(\\.[^"\\]*)*)"', lambda m: m.group(0).replace('\n', '\\n').replace('\r', '\\r'), raw)
              return json.loads(raw)

          now = datetime.datetime.utcnow().isoformat() + 'Z'
          os.makedirs('public/data', exist_ok=True)

          # News with web search
          print(f'Searching latest robot news for {today}...')
          news_prompt = f'''Search for the latest robotics news today ({today}) and return as pure JSON only.
Search for: humanoid robots (Figure AI, 1X, Unitree, Boston Dynamics), robot open source projects on GitHub, arXiv cs.RO papers, robotics industry news, RL/imitation learning breakthroughs.
CRITICAL: Output ONLY raw JSON, no markdown, no explanation.
Format: {{"items":[{{"title":"Title in Chinese","summary":"2-3 sentence summary in Chinese","reason":"Why this matters in Chinese","source":"Source name","time":"今日","category":"hardware or software or paper or industry or opensource","score":75,"tags":["tag1"],"url":"actual URL if found or empty string"}}],"total_searched":80}}
Return 8-10 items with REAL URLs where possible. JSON only.'''

          news_text = call_claude(news_prompt)
          news = extract_json(news_text)
          news['generatedAt'] = now
          with open('public/data/news.json', 'w', encoding='utf-8') as f:
              json.dump(news, f, ensure_ascii=False, indent=2)
          print(f'News done: {len(news.get("items", []))} items')

          time.sleep(3)

          # Daily digest with web search
          print('Generating daily digest...')
          daily_prompt = f'''Search for today's ({today}) robotics news and create a daily digest. Output ONLY raw JSON:
{{"sections":[{{"title":"Section name in Chinese","items":["News item in Chinese with source","Item 2","Item 3"]}}]}}
Use exactly 4 sections: 硬件发布, 开源项目, 论文速递, 产业动态. Each 3-4 items. JSON only.'''

          daily_text = call_claude(daily_prompt)
          daily = extract_json(daily_text)
          daily['generatedAt'] = now
          with open('public/data/daily.json', 'w', encoding='utf-8') as f:
              json.dump(daily, f, ensure_ascii=False, indent=2)
          print(f'Daily done: {len(daily.get("sections", []))} sections')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "Robot LAB Bot"
          git config user.email "bot@robot-lab.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d')"
          git push
