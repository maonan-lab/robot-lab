name: Daily Robot News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate.py

      - name: Commit and push
        run: |
          git config user.name "Robot LAB Bot"
          git config user.email "bot@robot-lab.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d')"
          git push --force
